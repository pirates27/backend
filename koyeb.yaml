# Koyeb Deployment Configuration
name: landlens-backend
services:
  - name: backend-api
    type: web
    ports:
      - port: 8080
        protocol: http
    routes:
      - path: /
        port: 8080
    health_check:
      grace_period: 30
      interval: 10
      restart_limit: 3
      http:
        path: /actuator/health
    regions:
      - fra
    env:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        value: ${secret.DB_URL}
      - key: DB_USERNAME
        value: ${secret.DB_USERNAME}
      - key: DB_PASSWORD
        value: ${secret.DB_PASSWORD}
      - key: JWT_SECRET
        value: ${secret.JWT_SECRET}
